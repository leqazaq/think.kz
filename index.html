<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>think.kz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --muted: #888880;
      --line: #d8d6ce;
      --bg: #f7f5f0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .wrap {
      text-align: center;
      max-width: 480px;
    }

    .domain {
      font-size: clamp(2.2rem, 8vw, 3.8rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 1.6rem;
    }

    .domain span {
      color: var(--muted);
      font-style: italic;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--line);
      margin: 0 auto 1.6rem;
    }

    .status {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-style: normal;
      margin-bottom: 3.2rem;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .contact .name {
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
    }

    .contact a {
      font-size: 0.95rem;
      color: var(--muted);
      text-decoration: none;
      font-style: italic;
      transition: color 0.2s;
    }

    .contact a:hover {
      color: var(--ink);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #e8e6e0;
        --muted: #7a7870;
        --line: #2e2d28;
        --bg: #111110;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="domain">think<span>.kz</span></p>
    <div class="divider"></div>
    <p class="status">Coming soon</p>
    <div class="contact">
      <span class="name">Bakbergen Urakbay</span>
      <a href="mailto:urakbay@yahoo.com">urakbay@yahoo.com</a>
      <a href="BakbergenLinks.html">Open New Page</a>
    </div>
  </div>
</body>
</html>
